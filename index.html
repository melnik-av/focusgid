<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Иммерсивная прогулка</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        .player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; font-weight: 600; }
        .icon { font-size: 48px; margin-bottom: 20px; display: block; }
        #status {
            margin: 20px 0;
            font-size: 15px;
            color: #a0a0b0;
            min-height: 40px;
            line-height: 1.4;
        }
        
        /* Прогресс-бар */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-container.active {
            display: block;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 10px;
            display: none;
        }
        .progress-text.active {
            display: block;
        }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled {
            background: #4a4a5a;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        .hint {
            margin-top: 24px;
            font-size: 12px;
            color: #6c6c7d;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="player">
        <span class="icon">🎧</span>
        <h1 id="trackTitle">Загрузка...</h1>
        <div id="status">Инициализация...</div>
        
        <!-- Прогресс-бар -->
        <div class="progress-text" id="progressText">Загрузка: 0%</div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <button id="playBtn" disabled>Загрузка...</button>
        <div class="hint">
            💡 <strong>Важно:</strong> Не блокируйте экран телефона во время прогулки. 
            Приложение автоматически не даст экрану погаснуть.
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
